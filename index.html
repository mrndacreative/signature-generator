<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Signature Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Helvetica Neue,Helvetica,Arial,sans-serif;background:#f9f9f9;min-height:100vh;padding:32px 24px}
h1{font-size:17px;font-weight:600;color:#111;margin-bottom:4px}
.sub{font-size:13px;color:#777;margin-bottom:24px}
.tabs{display:flex;gap:0;border-bottom:1.5px solid #e0e0e0;margin-bottom:24px}
.tab{padding:8px 20px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;font-family:Helvetica Neue,Helvetica,Arial,sans-serif;font-weight:500}
.tab.active{color:#111;border-bottom:2.5px solid #111}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-family:Helvetica Neue,Helvetica,Arial,sans-serif}
.field input:focus{outline:none;border-color:#999}
.preview-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.preview-box{background:#fff;padding:24px;margin-bottom:20px;display:inline-block;min-width:100%}
.actions{display:flex;align-items:center;gap:12px}
.copy-btn{display:inline-flex;align-items:center;gap:6px;background:#111;color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:Helvetica Neue,Helvetica,Arial,sans-serif}
.copy-btn:hover{background:#333}
.note{font-size:12px;color:#999}
.copied{font-size:12px;color:#444;display:none}
</style>
</head>
<body>

<h1>Email Signature Generator</h1>
<p class="sub">Fill in your details, select a brand, click Copy — then paste into Gmail. Leave any field blank to hide it.</p>

<div class="tabs">
  <button class="tab active" onclick="switchBrand('prism',this)">Prism</button>
  <button class="tab" onclick="switchBrand('elephant',this)">Elephant</button>
  <button class="tab" onclick="switchBrand('soofi',this)">Soofi.xyz</button>
</div>

<div class="fields">
  <div class="field"><label>Name</label><input id="f-name" value="Soofi Safavi" oninput="render()"></div>
  <div class="field"><label>Title</label><input id="f-title" value="Founder &amp; CEO" oninput="render()"></div>
  <div class="field">
    <label>Phone <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional)</span></label>
    <input id="f-phone" value="(123) 456-7890" placeholder="Leave blank to hide" oninput="render()">
  </div>
  <div class="field">
    <label>LinkedIn URL <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional)</span></label>
    <input id="f-li" value="https://linkedin.com/in/soofi-safavi" placeholder="Leave blank to hide" oninput="render()">
  </div>
  <div class="field">
    <label>X URL <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional)</span></label>
    <input id="f-x" value="https://x.com/prismagents" placeholder="Leave blank to hide" oninput="render()">
  </div>
  <div class="field" id="ss-field" style="display:none">
    <label>Substack URL <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">(optional)</span></label>
    <input id="f-ss" value="https://substack.com" placeholder="Leave blank to hide" oninput="render()">
  </div>
</div>

<div class="preview-label">Preview</div>
<div class="preview-box" id="preview"></div>

<div class="actions" style="margin-top:16px">
  <button class="copy-btn" onclick="copySig()">Copy signature</button>
  <span class="copied" id="copied-msg">✓ Copied — paste into Gmail</span>
  <span class="note">Gmail Settings → Signature → paste</span>
</div>

const BRANDS={
  prism:    {logo:PRISM,    logoSize:L,  site:"prismteam.ai", href:"https://prismteam.ai",   hasSS:false, defaultX:"https://x.com/prismagents",   defaultLI:"https://linkedin.com/in/soofi-safavi"},
  elephant: {logo:ELEPHANT, logoSize:L,  site:"elephant.xyz", href:"https://elephant.xyz",   hasSS:false, defaultX:"https://x.com/elephant_xyz",  defaultLI:"https://linkedin.com/in/soofi-safavi"},
  soofi:    {logo:HEADSHOT, logoSize:72, site:"soofi.xyz",    href:"https://www.soofi.xyz/", hasSS:true,  defaultX:"https://x.com/elephant_xyz",  defaultLI:"https://linkedin.com/in/soofi-safavi"},
};

let brand="prism";

function switchBrand(b,el){
  brand=b;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  const cfg=BRANDS[b];
  document.getElementById("ss-field").style.display=cfg.hasSS?"block":"none";
  document.getElementById("f-x").value=cfg.defaultX;
  document.getElementById("f-li").value=cfg.defaultLI;
  render();
}

function v(id){return document.getElementById(id).value.trim();}

function iconCell(href,src,alt){
  if(!href) return "";
  return `<td style="padding-right:8px;"><a href="${href}" target="_blank" style="text-decoration:none;"><img src="${src}" width="${I}" height="${I}" alt="${alt}" style="display:block;"></a></td>`;
}

function sigHTML(){
  const cfg=BRANDS[brand];
  const name=v("f-name"),title=v("f-title"),phone=v("f-phone");
  const li=v("f-li"),x=v("f-x"),ss=v("f-ss");
  const sz=cfg.logoSize;

  const phoneRow=phone
    ?`<tr><td style="font-family:${F};font-size:13px;color:#444;padding-bottom:7px;">${phone}</td></tr>`
    :"";
  const belowTitle=phone?"padding-bottom:2px;":"padding-bottom:7px;";

  const liIcon = iconCell(li, LI_IMG, "LinkedIn");
  const xIcon  = iconCell(x,  XI_IMG, "X");
  const ssIcon = cfg.hasSS ? iconCell(ss, SS_IMG, "Substack") : "";
  const hasIcons = li || x || (cfg.hasSS && ss);
  const pipe = hasIcons
    ? `<td style="font-family:${F};font-size:13px;color:#bbb;padding-right:8px;">|</td>`
    : "";

  return `<table cellpadding="0" cellspacing="0" border="0" style="font-family:${F};margin:0;padding:0;">
  <tr>
    <td valign="middle" style="padding-right:14px;padding-left:0;margin:0;"><img src="${cfg.logo}" width="${sz}" height="${sz}" alt="" style="display:block;"></td>
    <td valign="middle" style="padding:0;margin:0;">
      <table cellpadding="0" cellspacing="0" border="0" style="margin:0;padding:0;">
        <tr><td style="font-family:${F};font-weight:bold;font-size:14px;color:#0d0d0d;padding-bottom:2px;padding-left:0;">${name}</td></tr>
        <tr><td style="font-family:${F};font-size:13px;color:#444;${belowTitle}padding-left:0;">${title}</td></tr>
        ${phoneRow}
        <tr><td style="padding-left:0;"><table cellpadding="0" cellspacing="0" border="0" style="margin:0;padding:0;"><tr>
          ${liIcon}${xIcon}${ssIcon}
          ${pipe}
          <td style="padding:0;"><a href="${cfg.href}" target="_blank" style="font-family:${F};font-size:13px;color:#444;text-decoration:none;">${cfg.site}</a></td>
        </tr></table></td></tr>
      </table>
    </td>
  </tr>
</table>`;
}

function render(){
  document.getElementById("preview").innerHTML=sigHTML();
}

function copySig(){
  const el=document.getElementById("preview");
  const r=document.createRange();
  r.selectNode(el);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(r);
  document.execCommand("copy");
  window.getSelection().removeAllRanges();
  const m=document.getElementById("copied-msg");
  m.style.display="inline";
  setTimeout(()=>m.style.display="none",3000);
}

render();
</script>
</body>
</html>
